name: kampus_care
description: Campus Lost & Found App - Kampus Care

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.4.0
  http: ^1.2.0

  # UI
  cached_network_image: ^3.3.1

  # Location & Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Media
  image_picker: ^1.1.2

  # Launcher
  url_launcher: ^6.3.0
  geocoding: ^4.0.0
  flutter_dotenv: ^6.0.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon_launcher.png"
  min_sdk_android: 21
  
  # Opsional - Android adaptive icon
  adaptive_icon_background: "#FFFFFF"  # warna background
  adaptive_icon_foreground: "assets/images/icon_launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/icon_launcher.png
    - .env
